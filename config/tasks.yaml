scrape_news_task:
  description: |
    Extract the news article text. The article text is already provided in the task inputs as `extracted_text`.
    
    **YOUR TASK:**
    - The task inputs contain `extracted_text` with the complete news article
    - Return the `extracted_text` value directly as your output
    - DO NOT scrape URLs
    - DO NOT call tools
    - DO NOT modify the text
    - Simply return: {extracted_text}
  expected_output: >
    Return the extracted_text value from task inputs exactly as provided
  agent: disruption_monitoring_agent
  input_keys:
    - extracted_text
    - website_url
  output_keys:
    - extracted_text


analyze_disruptions_task:
  description: |
    - You are a **top-tier expert** in **supply chain risk management**, working in an *******{company_name}*********** specializing in **disruptions, ripple effects, and industry interdependencies**. 
    - You have extensive experience analyzing news and **logically mapping disruptions to supply chains**.
    - Your job is to logically ask questions in sequence and communicate with the knowledge graph query agent back and fourth ***NOT ONLY ONCE*** to get the answers you need to perform a supply chain impact risk assessment.
    - You need to ask a question, query the knowledge graph, get the answers, then ask the next question and so on to perform a full comprehensive analysis up to **Tier-3**
    
    **CRITICAL: The news article text is in the task inputs as `extracted_text`.**
    - The `extracted_text` variable contains the complete news article that you need to analyze.
    - Use this `extracted_text` from the task inputs - it has already been provided to you.
    - Analyze this news article with **extreme expert-level reasoning** and extract key details in a structured format. 
    - Use a **step-by-step chain of thought** before generating **structured JSON output**.

    ### **Instructions:**
    1️. **Understand the article** in extreme detail from a **supply chain risk management** perspective. Remember, you are a supply chain disruption top-tier expert. 
    2️. **Classify the disruption type** using EXACTLY one of these labels:
       - "Geopolitical" (wars, sanctions, political instability, territorial disputes)
       - "Trade Policy" (tariffs, trade wars, import/export restrictions, embargoes)
       - "Natural Disaster" (earthquakes, floods, hurricanes, volcanic eruptions, wildfires)
       - "Labour Strike" (worker strikes, union disputes, labour shortages, walkouts)
       - "Economic Crisis" (recessions, currency collapse, hyperinflation, financial crises)
       - "Company Bankruptcy" (corporate insolvency, liquidation, financial distress)
       - "Cyber Attack" (ransomware, data breaches, IT disruptions)
       - "Pandemic" (disease outbreaks, health emergencies)
       - "Other" (any disruption not fitting above categories)
       **CRITICAL:** Read the article carefully. A labour strike is NOT an economic crisis. A trade war is NOT geopolitical. Use the MOST SPECIFIC label that matches.
    3️. **Generate at least 3 deep supply chain risk manager expert thoughts and at least 3 deep supply action thoughts**, considering **companies, industries, and supply chain tiers affected**.
    4️. **Extract key impacted elements**: countries, industries, companies.
    5️. **Formulate logical, systematic and actionable supply chain risk questions** (but **only for queries the database can answer**):
       - The questions need to be asked systematically, if a disruption has been identified in a region for example, check Tier-1 companies located within that region. 
       - If companies were found in Tier-1 affected region, list them, but then also futher investigate their Tier-2 dependency as well and check whether they have suppliers in the same affected region. Same thing for Tier-3.
       - If no companies were found in Tier-1 in the affected region, check Tier-2, and Tier-3 and always remember to list the company it is linked to from its upper Tier as this is important to understand the level of risk each company is exposed to.
       - For example, if a company on Tier-1 is located in the disrupted region, and also have companies on their tier-2 that are located in the disrupted region, this means it is exposed to higher risk of failing, exposing our company to higher risk too.
       - **The database contains:** companies, supplier relationships (up to Tier-3), locations, and industries.
       - **DO NOT generate invalid questions beyond database capabilities.**
       - ******** the questions need to be direct, do not require high-level interpretation. For example, do not write “Which of our suppliers are based in the EU and could face increased costs due to potential tariffs?” Instead, only ask: “Which of our suppliers (up to tier-3) are based in the EU?” *******
       - **Avoid abstract questions requiring additional interpretation.**
       - **Ensure all questions reference {{company_name}} explicitly**.
       - Example: CORRECT! *"Which of {{company_name}}'s Tier-1 suppliers are based in China?"*
       - WRONG! **Avoid generic questions like "Which of our suppliers are based in China?"**
       

    6️. **Output findings in strict JSON format** with the following structure (NO additional text, markdown, or explanations—return JUST the JSON object):

    ***** Example 1: *****
    Article: "A severe earthquake in Japan has disrupted manufacturing facilities..."
    - Expert Thought 1: As a supply chain risk expert working in an **automotive company**, I immediately recognize the **critical dependencies our company and the **automotive industry** has on Japanese suppliers**. Japan is a key **supplier of automotive semiconductors, engine components, and lithium-ion batteries**. A major earthquake will likely disrupt **our Tier-1 or Tier-2 suppliers**, potentially leading to **delays in vehicle production**.
    - Expert Thought 2: I must immediately assess **which of our direct suppliers (Tier-1) are based in Japan** and whether any of them **source subcomponents from affected regions**. A disruption at the **Tier-2 or Tier-3 level can create a cascading failure** affecting our production schedules, especially if alternative suppliers do not exist.
    - Expert Thought 3: I will first start by tracing our Tier-1 suppliers. Then systematically think of the extended supply chain. If our **Tier-1 suppliers rely on Japanese semiconductor or electronic component manufacturers**, this event could **delay the delivery of critical parts** (e.g., **ECUs, sensors, lithium-ion batteries**), forcing us to either find alternative suppliers or slow down production.
    - Expert Thought 4: Based on facts and knowledge and my expertise, I know that Toyota, Honda, Nissan and ... are Japanese automotive manufacturers. Those companies may definitely be impacted by the disruption. Also, manufacturers supplying those companies that are based in Japan such as ...... will be impacted!

    *** Disruption Analysis ***

    ```json
    {{
      "type": "Natural Disaster",
      "involved": {{
        "countries": ["Japan"],
        "industries": ["Automotive"],
        "companies": ["Toyota", "Honda", "Denso", "Renesas", "Nissan"]
      }},
      "summary": "A severe earthquake in Japan has disrupted key automotive manufacturing facilities. Given Japan’s role as a major supplier of semiconductors, sensors, and lithium-ion batteries, our company must immediately assess its Tier-1 and Tier-2 supplier dependencies to mitigate potential production delays."
    }}
    ```
    - Action Thought 1: I will first start by checking whether we have any direct Tier-1 dependency on companies located in Japan. Based on the answers I get from my first question, I will formulate my second question.
    - Action Thought 2: If I find Tier-1 comapnies in Japan, I will further map out their extended supply chain to check for Tier-2 and Tier-3 depndency.
    - Action Thought 3: If I don't find direct  Tier-1 dependency, I will scan all Tier-2 suppliers and check who of them are located in Japan, then, check which company from my Tier-1 do they supply to. I will do the same thing for Tier-3.
    - Action Thought 4: Ok let me query the knowledge graph agent with my 1st question, and then based on the answer, I formulate my 2nd question.
    
    ```questions
    {{
      "1st question": "Which of {{company_name}}'s Tier-1 suppliers are in based in Japan?"
      }}
  
  expected_output: >
    Return ONLY a strict JSON object with keys: type, involved {countries, industries, companies}, questions (array), and summary. No extra text or formatting.
  agent: disruption_monitoring_agent
  input_keys:
    - extracted_text
    - company_name
  output_keys:
    - disruption_analysis
    - company_name


kg_query_task:
  description: |
    **CRITICAL: DO NOT ATTEMPT TO RETURN FULL KG DATA**
    **You are protecting {company_name}.**

    **YOUR SINGLE TASK:**
    Call `build_and_save_kg` tool EXACTLY ONCE with:
      - `monitored_company`: "{company_name}"
      - `disrupted_countries`: extract from `disruption_analysis.involved.countries` (empty list if missing)
      - `disrupted_companies`: extract from `disruption_analysis.involved.companies` (empty list if missing)
      - `scenario_id`: "{scenario_id}"
    
    The tool will:
      - Build all disrupted supply chains (Tier-1 to Tier-4)
      - Save them to disk (to avoid LLM token limits)
      - Return ONLY metadata (path, counts)
    
    **YOUR FINAL ANSWER = the tool's metadata output EXACTLY AS-IS:**
    {
      "success": true,
      "kg_payload_path": "/path/to/saved/kg.json",
      "monitored_company": "Tesla Inc",
      "disrupted_countries": ["South Africa"],
      "chain_counts": {"tier_1": 0, "tier_2": 4, "tier_3": 52, "tier_4": 545},
      "total_chains": 601,
      "message": "Built and saved 601 disrupted supply chains to ..."
    }
    
    **DO NOT:**
      - Call get_saved_kg_for_output (the evaluation script will load the full data)
      - Attempt to return the full chain data (it's too large for LLM)
      - Summarize or modify the metadata
      - Add any commentary
    
    **JUST RETURN THE METADATA JSON FROM THE TOOL.**
   
  expected_output: >
    Metadata JSON with keys: success, kg_payload_path, monitored_company, disrupted_countries,
    chain_counts (dict), total_chains (int), and message (str). The evaluation script will load
    the full KG data from the saved path.
  agent: kg_query_agent
  input_keys:
    - disruption_analysis
    - company_name
    - scenario_id
  output_keys:
    - kg_results
    - company_name


