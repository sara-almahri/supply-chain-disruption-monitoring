sourcing_task:
  description: |
    As **Sourcing Specialist**, execute the Tier-1 supplier actions defined by the Chief Supply Chain Officer.
    - Only act on Tier-1 suppliers flagged in the decision plan (replacement, buffering, dual-sourcing).
    - For replacement requests, search for alternative Tier-1 candidates matching product, quality, lead-time, and geography requirements.
    - Evaluate potential suppliers based on cost, lead time, stability, and deliverable fit; summarise findings in structured JSON.
    - Provide updated supply chain mapping (Tier-0 → Tier-1) for any approved alternatives.
  expected_output: >
    A JSON object detailing the alternative suppliers found, their evaluation scores, and the updated supply chain map if applicable.
  agent: sourcing_agent
  input_keys:
  - decisions
  output_keys:
  - sourcing_results