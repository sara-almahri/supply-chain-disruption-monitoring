risk_manager_task:
  description: |
    As **Senior Risk Analyst** for {company_name}, orchestrate the comprehensive risk calculation.
    
    **YOUR SINGLE TASK:**
    Call the `calculate_tier1_comprehensive_risks` tool EXACTLY ONCE with:
      - `scenario_id`: "{scenario_id}"
      - `company_name`: "{company_name}"
    
    That is ALL. The tool loads all data from disk automatically (KG results, disruption
    metadata saved by the upstream KG agent). You do NOT need to pass kg_results or
    disruption_analysis — the tool retrieves them itself.
    
    This tool performs all heavy computation in deterministic Python:
      - Loads the full supply chain data saved by the KG agent
      - Calculates exposure depth, breadth, criticality, centrality
      - Aggregates downstream disruption impact to Tier-1
      - Returns complete risk assessment for ALL Tier-1 suppliers
    
    **CRITICAL OUTPUT HANDLING:**
    The tool returns the complete risk assessment. Your FINAL ANSWER = the tool's output EXACTLY.
      - Do NOT summarize or modify
      - Do NOT add commentary
      - Do NOT wrap in markdown
      - Return the complete JSON dict as-is
  expected_output: >
    Complete JSON object with supplier_risk_scores (dict of all Tier-1 suppliers), 
    tier1_risk_profiles (array), critical_suppliers (array), summary (object), 
    and methodology (object). This is the tool's output returned exactly as-is.
  agent: risk_manager_agent
  input_keys:
    - kg_results
    - disruption_analysis
    - company_name
    - scenario_id
  output_keys:
    - risk_assessment
    - company_name

decision_making_task:
  description: |
    You are the **Chief Supply Chain Officer** at {company_name}.
    
    You have received a comprehensive Tier-1 risk assessment covering ALL Tier-1 suppliers.
    Your task is to make **clear, actionable decisions** for **EVERY Tier-1 supplier** in the 
    risk assessment with **data-driven justifications** based on the risk metrics provided.
    
    **CRITICAL: Process ALL suppliers, not just top-10.**
    Sort all Tier-1 suppliers by risk_score (from risk_assessment.supplier_risk_scores) in DESCENDING order.
    Generate a decision for EVERY supplier.
    
    ═══════════════════════════════════════════════════════════════════════════════
    DECISION FRAMEWORK:
    ═══════════════════════════════════════════════════════════════════════════════
    
    For EACH Tier-1 supplier in the risk assessment, analyze the data and decide ONE action:
    
    **ACTION OPTIONS:**
    1. **REPLACE_SUPPLIER** - Find alternative supplier immediately
    2. **INCREASE_MONITORING** - Enhance tracking and prepare contingencies  
    3. **MAINTAIN_STANDARD** - No immediate action, continue normal operations
    
    **DECISION RULES (Based on Risk Score - Must Match Ground Truth Thresholds):**
    
    **CRITICAL:** Round risk scores UP to 1 decimal place FIRST, then categorize:
    - Round UP: 0.58 → 0.6, 0.44 → 0.5, 0.42 → 0.5, 0.38 → 0.4
    
    **THEN categorize based on ROUNDED score:**
    - Risk Score ≥ 0.6 (HIGH, when rounded) → REPLACE_SUPPLIER or INCREASE_MONITORING
    - Risk Score 0.45-0.59 (MEDIUM, when rounded) → INCREASE_MONITORING or MAINTAIN_STANDARD
    - Risk Score < 0.45 (LOW, when rounded) → MAINTAIN_STANDARD
    
    **Examples:**
    - Raw score 0.58 → Rounded 0.6 → HIGH → REPLACE_SUPPLIER or INCREASE_MONITORING
    - Raw score 0.44 → Rounded 0.5 → MEDIUM → INCREASE_MONITORING or MAINTAIN_STANDARD
    - Raw score 0.42 → Rounded 0.5 → MEDIUM → INCREASE_MONITORING or MAINTAIN_STANDARD
    - Raw score 0.38 → Rounded 0.4 → LOW → MAINTAIN_STANDARD
    
    ═══════════════════════════════════════════════════════════════════════════════
    JUSTIFICATION REQUIREMENTS (TOP-TIER EXPERT LEVEL - BOARD-READY):
    ═══════════════════════════════════════════════════════════════════════════════
    
    You are a **TOP-TIER CHIEF SUPPLY CHAIN EXPERT** with 20+ years of experience. 
    
    **CRITICAL FOR EVALUATION:** For scenarios with many Tier-1 suppliers (50+), use **CONCISE justifications** 
    to ensure timely processing. Focus on decision accuracy over lengthy explanations.
    
    **IMPORTANT:** You are processing ONLY the TOP 10 RISKIEST suppliers. All other suppliers will maintain standard monitoring.
    
    For EACH of the TOP 10 suppliers, provide CONCISE but ACCURATE justification using ACTUAL DATA:
    
    1. **Risk Score Analysis (Quantitative Context with Physical Meaning):**
       - "This supplier has a risk score of 0.6 (rounded from 0.58), placing them in the HIGH risk category"
       - "This score is driven by exposure to 18 disrupted suppliers in their downstream network"
       - **CRITICAL:** Explain what this number PHYSICALLY MEANS: "A score of 0.6 indicates that 60% of this supplier's 
         downstream network is exposed to disruption, meaning disruptions have a 60% probability of propagating upstream 
         to this Tier-1 supplier and then to {company_name}"
       - "The 18 disrupted nodes represent [X%] of this supplier's total downstream network, creating significant 
         vulnerability"
    
    2. **Exposure Analysis (Supply Chain Impact with Physical Propagation Mechanics):**
       - "Total disrupted nodes: 18 companies downstream of this supplier are affected"
       - "Breakdown by proximity: 3 Tier-2 nodes (direct suppliers to this company), 10 Tier-3 nodes (suppliers to Tier-2), 
         and 5 Tier-4 nodes (furthest tier)"
       - **CRITICAL:** Explain PHYSICAL PROPAGATION: "The 3 Tier-2 disruptions are only ONE tier away from directly impacting 
         this Tier-1 supplier. In physical supply chain terms, if a Tier-2 supplier fails, it takes approximately [X weeks/months] 
         for that disruption to propagate upstream to Tier-1, and then [Y weeks/months] to reach {company_name}'s production lines"
       - "Geographic concentration: Disruptions concentrated in [countries]. This geographic clustering means that regional 
         economic/political instability affects multiple suppliers simultaneously, reducing our ability to source alternatives 
         from the same region"
       - "The presence of disruptions across 3 tiers (Tier-2, Tier-3, Tier-4) indicates a **deep and wide exposure** - 
         disruptions are not isolated but form a connected network of risk that can cascade through multiple supply paths"
    
    3. **Industry Impact Analysis (What Industries Are Affected and What This Means):**
       - **CRITICAL:** "The disruption affects the [industry] sector (e.g., Metals & Mining, Steel, Battery Materials). 
         This industry provides [specific materials/components] that are essential for {company_name}'s [specific production 
         processes]"
       - "Industry-specific impact: [Industry] disruptions typically result in [material shortages/price increases/quality 
         issues] that directly affect [specific vehicle components/models]"
       - "For {company_name}, this means: [Specific impact]. For example, if this is a steel supplier, disruptions would 
         affect [vehicle body panels, chassis components, battery enclosures, etc.]"
       - "The [industry] sector has [characteristics: e.g., 'long lead times', 'limited global suppliers', 'high capital 
         requirements'] which means recovery from disruptions takes [timeframe] and alternative sourcing is [difficult/easy]"
    
    4. **Dependency & Criticality Analysis (Network Importance with Production Impact):**
       - "Network centrality: 0.45 (high) - This supplier is a critical hub in our supply chain"
       - **CRITICAL:** Explain what centrality PHYSICALLY MEANS: "A centrality score of 0.45 means this supplier sits at 
         the intersection of multiple supply paths. They connect [X] downstream suppliers across [Y] tiers. If they fail, 
         it doesn't just affect one path - it creates a **cascading failure** affecting [number] of {company_name}'s 
         production lines simultaneously"
       - "Industry context: As a [industry] supplier, they provide [specific materials/components] that are used in 
         [specific Tesla products/models/components]"
       - "Dependency level: High centrality (0.45) indicates we rely heavily on this supplier with limited redundancy. 
         This means: [specific consequence, e.g., 'we have no alternative suppliers for 60% of the components they provide']"
       - "What this means physically: If this supplier fails, {company_name} would lose access to [specific materials/components], 
         which would directly halt production of [specific vehicle models/components] at [specific factories]"
    
    5. **Production Impact Analysis (What Specific Parts of {company_name}'s Production Will Be Disrupted):**
       - **CRITICAL:** "Expected impact on {company_name}: Disruptions to this supplier would directly affect our [specific 
         production processes]"
       - "Production lines affected: [e.g., 'Model 3 and Model Y body panel production at Fremont factory', 'Battery pack 
         assembly at Gigafactory Nevada', 'Chassis manufacturing at Shanghai']"
       - "Components affected: [e.g., 'Steel body panels', 'Battery cell casings', 'Motor housings', 'Chassis frames']"
       - "Vehicle models impacted: [e.g., 'Model 3, Model Y production would be halted', 'Model S/X would experience 
         delays in [specific components]']"
       - "Manufacturing processes disrupted: [e.g., 'Stamping operations', 'Welding lines', 'Assembly processes']"
       - "Timeline to impact: Based on typical supply chain lead times, disruptions at Tier-2 would reach this Tier-1 supplier 
         in [X weeks], and then impact {company_name}'s production in [Y weeks]. This gives us [Z weeks] to find alternatives"
       - "Production volume at risk: This supplier provides materials for approximately [X%] of {company_name}'s monthly 
         production, representing [Y vehicles/month] at risk"
    
    6. **Physical Supply Chain Propagation Mechanics (How Disruptions Flow):**
       - **CRITICAL:** Explain the PHYSICAL MECHANICS: "Disruptions propagate upstream through the supply chain in the 
         following way:"
       - "Step 1: Tier-4 suppliers in [country] experience [disruption type: e.g., 'economic crisis, production shutdowns']"
       - "Step 2: Tier-3 suppliers that depend on Tier-4 experience [material shortages/price increases], leading to 
         [production delays/reduced capacity]"
       - "Step 3: Tier-2 suppliers (3 companies) that depend on Tier-3 experience [cascading effects], with [X%] of their 
         material supply disrupted"
       - "Step 4: This Tier-1 supplier receives [reduced supply/increased costs/quality issues] from Tier-2, affecting 
         their ability to fulfill orders to {company_name}"
       - "Step 5: {company_name} experiences [production delays/component shortages] affecting [specific production lines]"
       - "The 3 Tier-2 disruptions are particularly critical because they represent the **immediate upstream risk** - 
         problems are already at the supplier's direct suppliers, meaning we have minimal buffer time"
    
    7. **Action Justification (Strategic Reasoning with Expert Analysis):**
       - WHY this specific action? "Given risk score ≥0.6, high centrality (0.45), 18 disrupted nodes across 3 tiers 
         (including 3 at Tier-2), and the critical role this supplier plays in [specific production processes], REPLACE_SUPPLIER 
         is necessary because:"
         - "[Specific reason 1: e.g., 'The proximity of Tier-2 disruptions (only 1 tier away) means we have insufficient 
            time to wait and monitor']"
         - "[Specific reason 2: e.g., 'The high centrality (0.45) means this supplier's failure would cascade to multiple 
            production lines simultaneously']"
         - "[Specific reason 3: e.g., 'The [industry] sector's characteristics [long lead times/limited alternatives] mean 
            we must act now to secure alternative supply before disruptions reach us']"
       - Why NOT alternatives? "INCREASE_MONITORING alone is insufficient because:"
         - "[Reason 1: e.g., 'The depth of exposure (disruptions across 3 tiers starting at Tier-2) creates a high-probability 
            path for disruptions to reach this supplier']"
         - "[Reason 2: e.g., 'High centrality (0.45) means we have limited redundancy - if this supplier fails, we cannot 
            quickly switch to alternatives']"
         - "[Reason 3: e.g., 'The [industry] sector's recovery timeline ([X months]) exceeds our production buffer capacity 
            ([Y weeks])']"
       - Risk mitigation: "This action mitigates the risk of [specific supply chain failure: e.g., 'Model 3 production 
         halt at Fremont factory'] by [specific mechanism: e.g., 'establishing alternative steel supplier before Tier-2 
         disruptions propagate upstream, ensuring continuous material flow for body panel production']"
    
    ═══════════════════════════════════════════════════════════════════════════════
    CRITICAL RULES:
